name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify macOS app
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Show toolchain
        run: |
          uname -m
          swift --version
          xcodebuild -version

      - name: Run complete verification
        run: make verify

      - name: Upload unsigned package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desk-setup-switcher-unsigned
          path: |
            artifacts/*.dmg
            artifacts/*.sha256
          if-no-files-found: error
          retention-days: 14
