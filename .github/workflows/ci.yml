name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify macOS app
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Show toolchain
        run: |
          uname -m
          swift --version
          xcodebuild -version

      - name: Run complete verification
        run: make verify

      - name: Audit public release history and assets
        run: make audit-public-release

      - name: Upload unsigned package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desk-setup-switcher-unsigned
          path: |
            artifacts/*.dmg
            artifacts/*.sha256
          if-no-files-found: error
          retention-days: 14

  verify-public-surface:
    name: Verify public site and release assets
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install public-asset inspection tools
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install ffmpeg@7
          echo "$(brew --prefix ffmpeg@7)/bin" >> "$GITHUB_PATH"

      - name: Install locked site dependencies
        working-directory: site
        run: npm ci --ignore-scripts

      - name: Audit site dependency advisories
        working-directory: site
        run: npm run audit:dependencies

      - name: Verify site and public release assets
        run: make verify-public-surface
