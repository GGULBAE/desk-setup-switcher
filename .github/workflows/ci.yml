name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify macOS app
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Show toolchain
        run: |
          uname -m
          swift --version
          xcodebuild -version

      - name: Run complete verification
        run: make verify

      - name: Upload unsigned package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desk-setup-switcher-unsigned
          path: |
            artifacts/*.dmg
            artifacts/*.sha256
          if-no-files-found: error
          retention-days: 14
