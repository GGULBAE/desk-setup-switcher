name: Retired legacy release workflow

on:
  workflow_dispatch:

# This path retains the disabled legacy workflow identity. Even if an operator
# accidentally re-enables it, the tombstone has no token permissions, invokes
# no action or repository script, and fails without mutating remote state.
permissions: {}

jobs:
  retired:
    name: Reject retired workflow dispatch
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    permissions: {}
    steps:
      - name: Refuse the retired release path
        shell: bash
        run: |
          echo "::error::This legacy release workflow is retired. Use the protected signed candidate workflow." >&2
          exit 1
