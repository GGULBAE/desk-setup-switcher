name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  unsigned-release:
    name: Verify and publish unsigned DMG
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Show toolchain
        run: |
          uname -m
          swift --version
          xcodebuild -version

      - name: Check tag matches bundle version
        run: |
          source scripts/lib/common.sh
          test "$GITHUB_REF_NAME" = "v$VERSION"

      - name: Run complete verification
        run: make verify

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            artifacts/*.dmg \
            artifacts/*.sha256 \
            --generate-notes \
            --verify-tag \
            --title "Desk Setup Switcher $GITHUB_REF_NAME (unsigned)"
