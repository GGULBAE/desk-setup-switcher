name: Feature request
description: Propose an in-scope capability or improvement
title: "[Feature]: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the manual user flow and expected capability/unsupported states.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety, permissions, privacy, and rollback
      description: Note any system mutation, permission, credential, experimental API, or failure mode.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This does not require automatic profile switching.
          required: true
        - label: This does not require telemetry, an account, a cloud service, UI automation, or private APIs.
          required: true
