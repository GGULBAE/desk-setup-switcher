name: Bug report
description: Report reproducible incorrect or unsafe behavior
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: "Do not include passwords, device serials, real SSIDs, exact locations, full IP addresses, or unredacted logs. Report security issues privately as described in SECURITY.md."
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS and Mac architecture
      placeholder: macOS 14.x, Apple Silicon
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [Profiles/storage, Display, Audio, Network, Legacy imported profile data, Apply/rollback, Menu bar/settings, Packaging, Other]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use synthetic or redacted names and note whether a live setting changed.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and rollback result
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials and personally identifying device/network/location data.
          required: true
        - label: This is not a security vulnerability that should be reported privately.
          required: true
